name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Locate Android project
        id: locate
        shell: bash
        run: |
          if [ -f "settings.gradle" ] || [ -f "settings.gradle.kts" ]; then
            echo "project_dir=." >> "$GITHUB_OUTPUT"
          elif [ -f "AlgoKraskaAndroid/settings.gradle" ] || [ -f "AlgoKraskaAndroid/settings.gradle.kts" ]; then
            echo "project_dir=AlgoKraskaAndroid" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Не найден settings.gradle. В корне репозитория должны находиться app, build.gradle и settings.gradle."
            echo "Содержимое репозитория:"
            find . -maxdepth 3 -type f | sort
            exit 1
          fi

      - name: Show project structure
        working-directory: ${{ steps.locate.outputs.project_dir }}
        run: |
          echo "Рабочая папка: $(pwd)"
          find . -maxdepth 4 -type f | sort

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle 8.13
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.13"

      - name: Build debug APK
        working-directory: ${{ steps.locate.outputs.project_dir }}
        run: gradle :app:assembleDebug --stacktrace --info

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AlgoKraska-debug-apk
          path: ${{ steps.locate.outputs.project_dir }}/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
