plugins {
    id "com.android.application"
}

android {
    namespace "com.algokraska.app"
    compileSdk 35

    defaultConfig {
        applicationId "com.algokraska.app"
        minSdk 24
        targetSdk 35
        versionCode 1
        versionName "1.2"
    }

    buildTypes {
        debug {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
